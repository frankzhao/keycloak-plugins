services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Pin the hostname so the "iss" claim in tokens is always localhost:8080,
      # matching what the browser uses and what Authlib validates against.
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  test-app:
    build:
      context: ./test-app
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      KEYCLOAK_REALM: juju
      KEYCLOAK_CLIENT_ID: test-app
      KEYCLOAK_CLIENT_SECRET: secret
      SECRET_KEY: dev-secret
    ports:
      - "5001:5000"
    # Allows the container to reach localhost:8080 on the host (where Keycloak
    # is port-mapped), so Authlib's server-side token exchange works after
    # KC_HOSTNAME pins the issuer to localhost.
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - keycloak

  setup:
    image: python:3.11-slim
    volumes:
      - ./scripts/setup.py:/setup.py
    command: python /setup.py
    depends_on:
      keycloak:
        condition: service_healthy
      saml-idp:
        condition: service_started
    restart: "no"

  saml-idp:
    image: kristophjunge/test-saml-idp
    ports:
      - "8085:8080"
    environment:
      # Tell the IdP which SP (Keycloak) it will be talking to
      SIMPLESAMLPHP_SP_ENTITY_ID: http://localhost:8080/realms/juju
      SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE: http://localhost:8080/realms/juju/broker/saml-test/endpoint
      SIMPLESAMLPHP_SP_SINGLE_LOGOUT_SERVICE: http://localhost:8080/realms/juju/broker/saml-test/endpoint
    volumes:
      # Custom auth-sources that adds 'cn' = 'user1'/'user2' so Keycloak
      # can use it as the principal attribute (uid is numeric: 1, 2).
      - ./saml-idp/authsources.php:/var/www/simplesamlphp/config/authsources.php:ro

volumes:
  postgres_data:
